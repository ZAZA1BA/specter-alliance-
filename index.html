<!DOCTYPE html>
<html>
<head>
    <title>Supabase Test</title>
</head>
<body>
    <button onclick="testSupabase()">Test Et</button>
    <pre id="result"></pre>

    <script>
        const SUPABASE_URL = "https://ovcrktkneuzxxravgnhu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_EuoT7yhxcHS6wyZfho_RNw_sWD0IhjP";

        async function testSupabase() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = '⏳ Gönderiliyor...';

            try {
                const payload = {
                    telegram_username: '@test_kullanici',
                    password: 'test123',
                    ip_address: '127.0.0.1',
                    user_agent: navigator.userAgent,
                    browser: 'Chrome',
                    os: 'Windows',
                    device_type: 'Desktop',
                    screen_resolution: '1920x1080',
                    language: 'tr',
                    timezone: 'Europe/Istanbul'
                };

                const response = await fetch(`${SUPABASE_URL}/rest/v1/logs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                resultDiv.textContent = JSON.stringify(data, null, 2);
                
                if (response.ok) {
                    alert('✅ Kayıt başarılı! Supabase\'e bak.');
                } else {
                    alert('❌ Hata: ' + response.status);
                }
            } catch (e) {
                resultDiv.textContent = '❌ Hata: ' + e.message;
                alert('Hata: ' + e.message);
            }
        }
    </script>
</body>
</html>
