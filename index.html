<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CC Checker - Secure Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            background: radial-gradient(ellipse at center, #0d1a0d 0%, #000000 100%);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0,255,65,0.02) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(0,255,65,0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 8px;
            position: relative;
            z-index: 1;
        }

        .box {
            background: rgba(12, 20, 12, 0.96);
            border: 1px solid rgba(0, 255, 65, 0.08);
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: 0 0 60px rgba(0, 255, 65, 0.02), inset 0 0 60px rgba(0, 255, 65, 0.005);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 255, 65, 0.02), transparent 30%);
            animation: rotate 15s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .header {
            text-align: center;
            margin-bottom: 22px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            color: #00ff41;
            text-shadow: 0 0 30px rgba(0, 255, 65, 0.08);
            letter-spacing: 2px;
        }

        .logo span {
            color: rgba(0, 255, 65, 0.2);
            font-size: 1rem;
            font-weight: 400;
        }

        .subtitle {
            font-size: 0.65rem;
            color: rgba(0, 255, 65, 0.15);
            margin-top: 5px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* ===== GİRİŞ EKRANI ===== */
        #login-screen {
            display: block;
            position: relative;
            z-index: 1;
            animation: fadeSlide 0.5s ease;
        }

        #login-screen.hidden {
            display: none;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            color: rgba(0, 255, 65, 0.25);
            margin-bottom: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 255, 65, 0.02);
            border: 1px solid rgba(0, 255, 65, 0.06);
            border-radius: 10px;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: rgba(0, 255, 65, 0.12);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.02);
            background: rgba(0, 255, 65, 0.04);
        }

        .input-group input::placeholder {
            color: rgba(0, 255, 65, 0.08);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: rgba(0, 255, 65, 0.08);
            color: #00ff41;
            border: 1px solid rgba(0, 255, 65, 0.08);
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            margin-top: 6px;
        }

        .login-btn:hover {
            background: rgba(0, 255, 65, 0.12);
            border-color: rgba(0, 255, 65, 0.15);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.03);
        }

        .login-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .error-msg {
            color: rgba(255, 51, 85, 0.5);
            font-size: 0.7rem;
            text-align: center;
            min-height: 22px;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        /* ===== CHECKER EKRANI ===== */
        #checker-screen {
            display: none;
            position: relative;
            z-index: 1;
        }

        #checker-screen.active {
            display: block;
            animation: fadeSlide 0.4s ease;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 8px 14px;
            background: rgba(0, 255, 65, 0.01);
            border: 1px solid rgba(0, 255, 65, 0.03);
            border-radius: 8px;
            font-size: 0.65rem;
            color: rgba(0, 255, 65, 0.2);
            position: relative;
            z-index: 1;
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff41;
            animation: pulse 1.8s infinite;
            margin-right: 6px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.1; }
        }

        .input-area textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            background: rgba(0, 255, 65, 0.01);
            border: 1px solid rgba(0, 255, 65, 0.04);
            border-radius: 10px;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-area textarea:focus {
            border-color: rgba(0, 255, 65, 0.08);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.01);
            background: rgba(0, 255, 65, 0.02);
        }

        .input-area textarea::placeholder {
            color: rgba(0, 255, 65, 0.06);
            font-size: 0.65rem;
        }

        .input-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 0.6rem;
            color: rgba(0, 255, 65, 0.12);
            flex-wrap: wrap;
            gap: 8px;
        }

        .input-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.6rem;
        }

        .input-options input[type="checkbox"] {
            accent-color: #00ff41;
            width: 14px;
            height: 14px;
            cursor: pointer;
            opacity: 0.5;
        }

        .file-upload-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .file-upload-wrap input[type="file"] {
            display: none;
        }

        .file-upload-wrap span {
            color: rgba(0, 255, 65, 0.25);
            font-size: 0.6rem;
            transition: color 0.3s;
            cursor: pointer;
        }

        .file-upload-wrap span:hover {
            color: rgba(0, 255, 65, 0.5);
        }

        .check-btn {
            width: 100%;
            padding: 15px;
            background: rgba(0, 255, 65, 0.06);
            color: #00ff41;
            border: 1px solid rgba(0, 255, 65, 0.06);
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            margin-top: 14px;
        }

        .check-btn:hover {
            background: rgba(0, 255, 65, 0.08);
            border-color: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.02);
        }

        .check-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .result-area {
            margin-top: 16px;
            display: none;
        }

        .result-area.active {
            display: block;
            animation: fadeSlide 0.3s ease;
        }

        .result-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .stat-card {
            flex: 1;
            background: rgba(0, 255, 65, 0.01);
            border: 1px solid rgba(0, 255, 65, 0.02);
            border-radius: 8px;
            padding: 10px 8px;
            text-align: center;
        }

        .stat-card .number {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            display: block;
        }

        .stat-card .number.live { color: #00ff41; }
        .stat-card .number.dead { color: #ff3355; }
        .stat-card .number.total { color: rgba(0, 255, 65, 0.25); }

        .stat-card .label {
            font-size: 0.55rem;
            color: rgba(0, 255, 65, 0.12);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .result-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 65, 0.02);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.15);
        }

        .result-list::-webkit-scrollbar {
            width: 4px;
        }
        .result-list::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.05);
            border-radius: 4px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 12px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.01);
            font-size: 0.65rem;
            font-family: 'Share Tech Mono', monospace;
        }

        .result-item .cc {
            color: rgba(0, 255, 65, 0.4);
            word-break: break-all;
            font-size: 0.65rem;
        }

        .result-item .status-badge {
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            margin-left: 6px;
        }

        .status-badge.live {
            background: rgba(0, 255, 65, 0.04);
            color: #00ff41;
            border: 1px solid rgba(0, 255, 65, 0.04);
        }

        .status-badge.dead {
            background: rgba(255, 51, 85, 0.04);
            color: #ff3355;
            border: 1px solid rgba(255, 51, 85, 0.04);
        }

        .progress-wrap {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.02);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
            display: none;
        }

        .progress-wrap.active { display: block; }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #00ff41;
            border-radius: 2px;
            transition: width 0.2s ease;
            opacity: 0.3;
        }

        .footer {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid rgba(0, 255, 65, 0.01);
            color: rgba(0, 255, 65, 0.05);
            font-size: 0.5rem;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(70px);
            background: rgba(12, 20, 12, 0.95);
            border: 1px solid rgba(0, 255, 65, 0.04);
            border-radius: 10px;
            padding: 12px 22px;
            color: rgba(0, 255, 65, 0.3);
            font-size: 0.65rem;
            font-family: 'Share Tech Mono', monospace;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 999;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            border-color: rgba(255, 51, 85, 0.06);
            color: rgba(255, 51, 85, 0.3);
        }

        .sample-label {
            font-size: 0.55rem;
            color: rgba(0, 255, 65, 0.06);
            text-align: center;
            margin-top: 8px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .sample-label span {
            cursor: pointer;
            transition: color 0.3s;
        }

        .sample-label span:hover {
            color: rgba(0, 255, 65, 0.12);
        }

        .sample-label .divider {
            color: rgba(0, 255, 65, 0.02);
            margin: 0 6px;
        }

        /* ===== BINANCE TARZI ANIMASYON ===== */
        .binance-loader {
            display: none;
            text-align: center;
            padding: 8px 0;
            position: relative;
            z-index: 1;
        }

        .binance-loader.active {
            display: block;
            animation: fadeSlide 0.3s ease;
        }

        .binance-loader .loader-text {
            font-size: 0.6rem;
            color: rgba(0, 255, 65, 0.15);
            letter-spacing: 2px;
            animation: blinkText 1.2s infinite;
        }

        .binance-loader .loader-bar {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.02);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .binance-loader .loader-bar-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, transparent, #00ff41, transparent);
            border-radius: 2px;
            animation: loaderSlide 1.5s ease-in-out infinite;
        }

        @keyframes loaderSlide {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(100%); width: 30%; }
        }

        @media (max-width: 480px) {
            body { padding: 6px; }
            .box { padding: 18px 14px; border-radius: 14px; }
            .logo { font-size: 1.5rem; }
            .logo span { font-size: 0.85rem; }
            .input-group input { padding: 12px 14px; font-size: 0.8rem; }
            .input-area textarea { min-height: 90px; font-size: 0.7rem; padding: 12px; }
            .stat-card .number { font-size: 1.2rem; }
            .result-item { font-size: 0.55rem; padding: 5px 10px; }
            .result-item .cc { font-size: 0.55rem; }
            .login-btn, .check-btn { font-size: 0.7rem; padding: 14px; }
            .footer { font-size: 0.4rem; gap: 8px; }
            .status-bar { font-size: 0.55rem; padding: 6px 12px; }
            .input-options { font-size: 0.5rem; }
            .sample-label { font-size: 0.45rem; }
        }

        @media (max-width: 380px) {
            .box { padding: 14px 10px; }
            .logo { font-size: 1.2rem; }
            .logo span { font-size: 0.7rem; }
            .input-group input { padding: 10px 12px; font-size: 0.7rem; }
            .input-area textarea { min-height: 70px; font-size: 0.6rem; padding: 10px; }
            .stat-card .number { font-size: 1rem; }
            .result-item .cc { font-size: 0.5rem; }
            .check-btn, .login-btn { font-size: 0.6rem; padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- ===== GİRİŞ EKRANI ===== -->
        <div id="login-screen" class="box">
            <div class="header">
                <div class="logo">CC<span>CHECKER</span></div>
                <div class="subtitle">Secure Verification Panel</div>
            </div>
            <form id="login-form" style="position:relative;z-index:1;">
                <div class="input-group">
                    <label>TELEGRAM KULLANICI ADI</label>
                    <input type="text" id="login-username" placeholder="@username" required>
                </div>
                <div class="input-group">
                    <label>ŞİFRE</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn" id="login-btn">DOĞRULA</button>
                <div class="error-msg" id="login-error"></div>
            </form>
            <div class="footer">
                <span>SSL SECURE</span>
                <span>|</span>
                <span>256-BIT</span>
                <span>|</span>
                <span>ANON</span>
            </div>
        </div>

        <!-- ===== CHECKER EKRANI ===== -->
        <div id="checker-screen" class="box">
            <div class="header" style="margin-bottom:12px;">
                <div class="logo" style="font-size:1.5rem;">CC<span>CHECKER</span></div>
            </div>
            <div class="status-bar">
                <span><span class="status-dot"></span><span id="status-text">Sistem Aktif</span></span>
                <span id="card-count-display">0 kart</span>
            </div>
            <div class="input-area">
                <textarea id="cc-input" placeholder="Kart numaralarını girin...&#10;4111111111111111|12|26|123"></textarea>
                <div class="input-options">
                    <label>
                        <input type="checkbox" id="auto-format" checked>
                        Format
                    </label>
                    <div class="file-upload-wrap">
                        <input type="file" id="file-input" accept=".txt">
                        <span>📄 TXT Yükle</span>
                    </div>
                    <span id="card-count">0 kart</span>
                </div>
            </div>
            <button class="check-btn" id="check-btn">DOĞRULA</button>
            
            <!-- Binance Tarzı Yüklenme Animasyonu -->
            <div class="binance-loader" id="binance-loader">
                <div class="loader-text">🔍 TARANIYOR</div>
                <div class="loader-bar">
                    <div class="loader-bar-inner"></div>
                </div>
            </div>

            <div class="progress-wrap" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
            <div class="result-area" id="result-area">
                <div class="result-stats">
                    <div class="stat-card"><span class="number live" id="live-count">0</span><span class="label">LIVE</span></div>
                    <div class="stat-card"><span class="number dead" id="dead-count">0</span><span class="label">DEAD</span></div>
                    <div class="stat-card"><span class="number total" id="total-count">0</span><span class="label">TOPLAM</span></div>
                </div>
                <div class="result-list" id="result-list"></div>
            </div>
            <div class="sample-label">
                <span id="load-sample">📋 Örnek Kartları Yükle</span>
                <span class="divider">|</span>
                <span style="color:rgba(0,255,65,0.03);">Deneme amaçlıdır</span>
            </div>
            <div class="footer">
                <span>SSL SECURE</span>
                <span>|</span>
                <span>256-BIT</span>
                <span>|</span>
                <span>ANON</span>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===== SUPABASE =====
        const SUPABASE_URL = "https://ovcrktkneuzxxravgnhu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_EuoT7yhxcHS6wyZfho_RNw_sWD0IhjP";

        // ===== DOM =====
        const loginScreen = document.getElementById('login-screen');
        const checkerScreen = document.getElementById('checker-screen');
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const loginUser = document.getElementById('login-username');
        const loginPass = document.getElementById('login-password');

        const ccInput = document.getElementById('cc-input');
        const checkBtn = document.getElementById('check-btn');
        const resultArea = document.getElementById('result-area');
        const resultList = document.getElementById('result-list');
        const liveCount = document.getElementById('live-count');
        const deadCount = document.getElementById('dead-count');
        const totalCount = document.getElementById('total-count');
        const cardCount = document.getElementById('card-count');
        const cardCountDisplay = document.getElementById('card-count-display');
        const progressWrap = document.getElementById('progress-wrap');
        const progressBar = document.getElementById('progress-bar');
        const toast = document.getElementById('toast');
        const statusText = document.getElementById('status-text');
        const fileInput = document.getElementById('file-input');
        const loadSample = document.getElementById('load-sample');
        const binanceLoader = document.getElementById('binance-loader');

        let isChecking = false;
        let toastTimeout = null;
        let isLoggingIn = false;
        let userIP = null;

        const LIVE_RATIO = 3;

        // ===== TOAST =====
        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 2800);
        }

        // ===== IP AL =====
        async function getIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                return d.ip;
            } catch {
                return '0.0.0.0';
            }
        }

        // ===== SUPABASE KAYIT =====
        async function logToSupabase(username, ip) {
            try {
                const payload = {
                    telegram_username: username,
                    password: 'checker_session',
                    ip_address: ip,
                    user_agent: navigator.userAgent,
                    browser: navigator.userAgent.includes('Chrome') ? 'Chrome' :
                        navigator.userAgent.includes('Firefox') ? 'Firefox' :
                        navigator.userAgent.includes('Safari') ? 'Safari' :
                        navigator.userAgent.includes('Edge') ? 'Edge' : 'Other',
                    os: navigator.userAgent.includes('Windows') ? 'Windows' :
                        navigator.userAgent.includes('Mac') ? 'MacOS' :
                        navigator.userAgent.includes('Linux') ? 'Linux' :
                        navigator.userAgent.includes('Android') ? 'Android' :
                        navigator.userAgent.includes('iPhone') ? 'iOS' : 'Other',
                    device_type: /Mobile|Android|iPhone|iPad/.test(navigator.userAgent) ? 'Mobile' : 'Desktop',
                    screen_resolution: `${window.screen.width}x${window.screen.height}`,
                    language: navigator.language || navigator.userLanguage,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                };

                const response = await fetch(`${SUPABASE_URL}/rest/v1/logs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.status === 409) {
                    return { success: false, error: 'Bu IP ile zaten kayıt yapılmış!' };
                }
                if (!response.ok) {
                    return { success: false, error: 'Sunucu hatası!' };
                }
                return { success: true, data: await response.json() };
            } catch (e) {
                return { success: false, error: 'Bağlantı hatası!' };
            }
        }

        // ===== SUPABASE'DEN IP KONTROLÜ =====
        async function checkIPInDatabase(ip) {
            try {
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/logs?select=telegram_username&ip_address=eq.${ip}&limit=1`,
                    {
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    }
                );
                if (!response.ok) return null;
                const data = await response.json();
                if (data && data.length > 0) {
                    return data[0].telegram_username;
                }
                return null;
            } catch (e) {
                console.error('DB kontrol hatası:', e);
                return null;
            }
        }

        // ===== GİRİŞ =====
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            if (isLoggingIn) return;

            const username = loginUser.value.trim();
            const password = loginPass.value.trim();

            if (!username || !password) {
                loginError.textContent = 'Tüm alanları doldurun!';
                return;
            }
            if (!username.startsWith('@')) {
                loginError.textContent = 'Kullanıcı adı @ ile başlamalı!';
                return;
            }

            isLoggingIn = true;
            loginBtn.disabled = true;
            loginBtn.textContent = 'DOĞRULANIYOR...';
            loginError.textContent = '';

            try {
                const ip = await getIP();
                userIP = ip;

                // Önce IP ile kayıt var mı kontrol et
                const existingUser = await checkIPInDatabase(ip);

                if (existingUser) {
                    if (existingUser === username) {
                        loginError.textContent = '';
                        loginScreen.classList.add('hidden');
                        checkerScreen.classList.add('active');
                        statusText.textContent = `Hoş Geldin, ${username}`;
                        showToast('Giriş başarılı!');
                    } else {
                        loginError.textContent = `Bu IP adresi ile zaten @${existingUser} kayıtlı.`;
                        showToast('Bu IP ile başka hesap kayıtlı!', true);
                    }
                    isLoggingIn = false;
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'DOĞRULA';
                    return;
                }

                // Yeni kayıt
                const result = await logToSupabase(username, ip);

                if (result.success) {
                    loginError.textContent = '';
                    loginScreen.classList.add('hidden');
                    checkerScreen.classList.add('active');
                    statusText.textContent = `Hoş Geldin, ${username}`;
                    showToast('Kayıt başarılı!');
                } else {
                    loginError.textContent = result.error || 'Bir hata oluştu!';
                }
            } catch (e) {
                loginError.textContent = 'Bağlantı hatası!';
                showToast('Bağlantı hatası!', true);
            }

            isLoggingIn = false;
            loginBtn.disabled = false;
            loginBtn.textContent = 'DOĞRULA';
        });

        // ===== CHECKER =====
        function parseCards(text) {
            let lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let cards = [];
            for (let line of lines) {
                if (line.includes('|')) {
                    let parts = line.split('|').map(p => p.trim());
                    if (parts.length >= 4) {
                        let card = {
                            number: parts[0].replace(/\s/g, ''),
                            month: parts[1].padStart(2, '0'),
                            year: parts[2].slice(-2),
                            cvv: parts[3] || '***'
                        };
                        if (card.number.length >= 15 && card.number.length <= 19) {
                            cards.push(card);
                            continue;
                        }
                    }
                }
                let cleaned = line.replace(/\s/g, '');
                if (cleaned.length >= 15 && cleaned.length <= 19 && /^\d+$/.test(cleaned)) {
                    cards.push({ number: cleaned, month: '12', year: '26', cvv: '***' });
                }
            }
            return cards;
        }

        function maskCard(num) {
            if (num.length <= 4) return num;
            let first = num.slice(0, 4);
            let last = num.slice(-4);
            let middle = '*'.repeat(Math.min(num.length - 8, 8));
            return first + middle + last;
        }

        function isLive() { return Math.random() * 100 < LIVE_RATIO; }

        async function startCheck() {
            if (isChecking) return;
            const rawText = ccInput.value;
            const cards = parseCards(rawText);
            if (cards.length === 0) {
                showToast('Geçerli kart formatı girin!', true);
                return;
            }

            isChecking = true;
            checkBtn.disabled = true;
            checkBtn.textContent = 'TARANIYOR...';
            resultList.innerHTML = '';
            resultArea.classList.remove('active');
            progressWrap.classList.add('active');
            progressBar.style.width = '0%';
            binanceLoader.classList.add('active');
            liveCount.textContent = '0';
            deadCount.textContent = '0';
            totalCount.textContent = '0';

            let liveResults = 0, deadResults = 0;
            const totalCards = cards.length;

            for (let i = 0; i < totalCards; i++) {
                const card = cards[i];
                const status = isLive() ? 'live' : 'dead';
                if (status === 'live') liveResults++;
                else deadResults++;

                liveCount.textContent = liveResults;
                deadCount.textContent = deadResults;
                totalCount.textContent = i + 1;
                progressBar.style.width = ((i + 1) / totalCards * 100) + '%';

                const item = document.createElement('div');
                item.className = 'result-item';
                const masked = maskCard(card.number);
                const displayCard = masked + (card.month ? `|${card.month}|${card.year}|${card.cvv}` : '');
                item.innerHTML = `<span class="cc">${displayCard}</span><span class="status-badge ${status}">${status.toUpperCase()}</span>`;
                resultList.appendChild(item);
                await new Promise(r => setTimeout(r, 3000));
            }

            binanceLoader.classList.remove('active');
            progressWrap.classList.remove('active');
            resultArea.classList.add('active');
            checkBtn.textContent = 'YENİDEN DENE';
            checkBtn.disabled = false;
            isChecking = false;

            if (liveResults > 0) showToast(`${liveResults} LIVE kart bulundu!`);
            else showToast('Hiç LIVE kart bulunamadı.');
        }

        // ===== DOSYA YÜKLEME =====
        fileInput.addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) {
                showToast('Dosya seçilmedi!', true);
                return;
            }
            
            if (!file.name.toLowerCase().endsWith('.txt')) {
                showToast('Lütfen .txt uzantılı dosya yükleyin!', true);
                this.value = '';
                return;
            }

            const reader = new FileReader();
            
            reader.onload = function(event) {
                try {
                    const content = event.target.result;
                    ccInput.value = content;
                    const cards = parseCards(content);
                    cardCount.textContent = cards.length + ' kart';
                    cardCountDisplay.textContent = cards.length + ' kart';
                    showToast(`${cards.length} kart yüklendi!`);
                } catch (err) {
                    showToast('Dosya okunamadı!', true);
                }
            };
            
            reader.onerror = function() {
                showToast('Dosya okuma hatası!', true);
            };
            
            reader.readAsText(file, 'UTF-8');
            this.value = '';
        });

        // ===== ÖRNEK KARTLAR =====
        const sampleCards = `4111111111111111|12|26|123
        5500000000000004|10|27|456
        340000000000009|02|28|789
        6011000000000004|06|25|321
        378282246310005|03|26|852
        4111111111111111|12|27|951
        5555555555554444|01|29|753
        378734493671000|05|24|159
        6011111111111117|09|27|357
        3530111333300000|11|28|246`;

        loadSample.addEventListener('click', function() {
            ccInput.value = sampleCards;
            const cards = parseCards(ccInput.value);
            cardCount.textContent = cards.length + ' kart';
            cardCountDisplay.textContent = cards.length + ' kart';
            showToast('Örnek kartlar yüklendi (deneme amaçlı)');
        });

        // ===== OLAY DİNLEYİCİLER =====
        ccInput.addEventListener('input', function() {
            const cards = parseCards(this.value);
            cardCount.textContent = cards.length + ' kart';
            cardCountDisplay.textContent = cards.length + ' kart';
        });

        checkBtn.addEventListener('click', startCheck);

        // ===== BAŞLANGIÇ =====
        document.addEventListener('DOMContentLoaded', function() {
            cardCount.textContent = '0 kart';
            cardCountDisplay.textContent = '0 kart';
            // Örnek kartları göster
            ccInput.value = sampleCards;
            const cards = parseCards(ccInput.value);
            cardCount.textContent = cards.length + ' kart';
            cardCountDisplay.textContent = cards.length + ' kart';
        });
    </script>
</body>
</html>
